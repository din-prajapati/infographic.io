name: Build, Test & Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build + unit tests (every PR + push)
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=api/prisma/schema.prisma

      - name: TypeScript check (API)
        run: npx tsc --noEmit
        working-directory: api
        continue-on-error: true

      - name: Build NestJS API
        run: npm run build
        working-directory: api

      - name: Build React SPA (Vite)
        run: npx vite build
        env:
          VITE_RAZORPAY_KEY_ID: ${{ secrets.VITE_RAZORPAY_KEY_ID }}
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:3001' }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Run unit tests
        run: npx vitest run --config vitest.config.ts --reporter=verbose
        working-directory: api
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-32chars-minimum
          RAZORPAY_KEY_SECRET: test-key-secret
          RAZORPAY_PLAN_SOLO_MONTHLY: plan_solo_monthly_test
          RAZORPAY_PLAN_TEAM_MONTHLY: plan_team_monthly_test
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

  # ─────────────────────────────────────────────
  # Job 2: Integration tests
  # Runs on push to main and tag pushes only
  # ─────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: infographic_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=api/prisma/schema.prisma

      - name: Push Prisma schema to test DB
        run: npx prisma db push --schema=api/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/infographic_test

      - name: Run integration tests
        run: npx vitest run --config vitest.integration.config.ts --reporter=verbose
        working-directory: api
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/infographic_test
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/infographic_test
          JWT_SECRET: test-jwt-secret-32chars-minimum
          RAZORPAY_KEY_SECRET: test-key-secret
          RAZORPAY_PLAN_SOLO_MONTHLY: plan_solo_monthly_test
          RAZORPAY_PLAN_TEAM_MONTHLY: plan_team_monthly_test

  # ─────────────────────────────────────────────
  # Job 3: Deploy to staging
  # Trigger: merge to main
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway staging
        run: railway up --service ${{ secrets.RAILWAY_STAGING_SERVICE_ID }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Staging health check
        run: |
          sleep 20
          curl -f ${{ secrets.STAGING_URL }}/api/health || echo "Health check failed — check Railway logs"
        continue-on-error: true

  # ─────────────────────────────────────────────
  # Job 4: Deploy to production
  # Trigger: git tag v* (e.g. v1.0.0)
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: integration-tests
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway production
        run: railway up --service ${{ secrets.RAILWAY_PROD_SERVICE_ID }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Production health check
        run: |
          sleep 30
          curl -f ${{ secrets.PROD_URL }}/api/health || echo "Health check failed — check Railway logs"
        continue-on-error: true
