# ENV.yaml — Environment variables required by this Epic
#
# Produced by `architect-agent` during `/design-epic` and refined during implementation.
# Cross-referenced by `devops-agent` before deploy.
#
# Update this file when:
#   - A new env var is needed for a story in this epic
#   - An existing var's purpose or example changes
#   - A var is moved to/from production-only

epic: "EPIC-{DOMAIN}-{NN}"

required:
  - name: EXAMPLE_API_KEY
    description: "What this variable controls or which service it authenticates"
    example: "sk-...{redacted}"
    set_in: ".env (local) | {deploy target} (production)"
    sensitive: true
    used_by:
      - "path/to/service.ts"

  - name: EXAMPLE_FEATURE_FLAG
    description: "Toggles {behavior}. Default: false."
    example: "false | true"
    set_in: ".env (local) | {deploy target} (production)"
    sensitive: false
    used_by:
      - "path/to/config.ts"

# Optional vars — feature enhancement but not required for core functionality
optional:
  - name: EXAMPLE_OPTIONAL_VAR
    description: "Enables {optional behavior} when set"
    example: "https://..."
    sensitive: false

# Vars deprecated/removed by this epic (track for cleanup)
deprecated:
  []
  # - name: OLD_VAR
  #   reason: "Replaced by EXAMPLE_API_KEY in this epic"
  #   remove_after: "After Phase 1 deploy"
