## InfographicAI — Global Environment (canonical AI context paths)
##
## Purpose
## - Give AI sessions exact paths without re-reading CLAUDE.md every time.
## - Machine-readable: scripts, AI prompts, PR files can reference ${env.KEY}
## - NO SECRETS here — API keys, passwords, tokens go in .env only.
##
## Usage in PR files / TASKS.md / AI prompts:
##   "Touch ${env.PAYMENTS_SERVICE} — update createSubscription()"
##   "Run: cd ${env.API_ROOT} && npx vitest run tests/payments/..."
##
## Epics may override any value via docs/agile/epics/{EPIC}/ENV.yaml

env:
  # ---------- Repo root ----------
  ROOT: "d:/Dinesh/DCloud/GITDrive/Work/Products/InfographicEditor-Unified"
  DOCS: "${env.ROOT}/docs"
  AGILE: "${env.DOCS}/agile"

  # ---------- API (NestJS) ----------
  API_ROOT:        "${env.ROOT}/api/src"
  MODULES:         "${env.ROOT}/api/src/modules"
  API_TESTS:       "${env.ROOT}/api/tests"
  PRISMA_SCHEMA:   "${env.ROOT}/api/prisma/schema.prisma"

  # ---------- Frontend (React/Vite) ----------
  CLIENT_SRC:      "${env.ROOT}/client/src"
  CLIENT_PAGES:    "${env.ROOT}/client/src/pages"
  CLIENT_LIB:      "${env.ROOT}/client/src/lib"
  CLIENT_COMPS:    "${env.ROOT}/client/src/components"

  # ---------- Domain component roots ----------
  EDITOR_COMPS:    "${env.ROOT}/client/src/components/editor"
  AI_CHAT_COMPS:   "${env.ROOT}/client/src/components/ai-chat"
  DESIGN_TOKENS:   "${env.ROOT}/client/src/index.css"

  # ---------- NestJS module paths ----------
  PAYMENTS_MODULE:    "${env.MODULES}/payments"
  PAYMENTS_SERVICE:   "${env.MODULES}/payments/services/payments.service.ts"
  AUTH_MODULE:        "${env.MODULES}/auth"
  AUTH_SERVICE:       "${env.MODULES}/auth/services/auth.service.ts"
  INFOGRAPHICS_MODULE: "${env.MODULES}/infographics"
  AI_MODULE:          "${env.MODULES}/ai-generation"

  # ---------- Server (Express proxy) ----------
  SERVER_ROOT:     "${env.ROOT}/server"
  RAZORPAY_PROVIDER: "${env.ROOT}/server/payments/providers/razorpay.provider.ts"

  # ---------- Dev commands ----------
  DEV_CMD:         "npm run dev"           # Express :5000 + NestJS :3001
  CHECK_CMD:       "npm run check"         # TypeScript check
  TEST_UNIT_CMD:   "npm run test:unit"     # All unit tests
  TEST_PAY_CMD:    "npm run test:payments:unit"
  TEST_E2E_CMD:    "npm run test:e2e"
  DEV_URL:         "http://localhost:5000"

  # ---------- Invariants / safety rules ----------
  NEVER_COMMIT:
    - ".env"
    - ".env.local"
    - ".env.test"
    - "*.key"
    - "secrets.*"
  NEVER_TOUCH_IN_AI_SESSION:
    - "${env.PRISMA_SCHEMA}  # schema changes require explicit migration step"
    - "api/prisma/migrations/   # never auto-generate migrations in AI session"
