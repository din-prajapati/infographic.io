## EPIC-DESIGN-01 — Environment overrides
##
## Overlay order:
##   docs/agile/ENV.yaml (global base)
##   docs/agile/epics/EPIC-DESIGN-01/ENV.yaml (this file)
##
## Only keys that differ from or extend the global defaults.

env:
  # Files in scope for this epic — AI must NOT touch anything outside this list
  EPIC_SCOPE:
    editor:
      - "${env.EDITOR_COMPS}/EditorToolbar.tsx"
      - "${env.EDITOR_COMPS}/FloatingToolbar.tsx"
      - "${env.EDITOR_COMPS}/ZoomControls.tsx"
      - "${env.EDITOR_COMPS}/LayersPanel.tsx"
      - "${env.EDITOR_COMPS}/AdjustmentsPanel.tsx"
      - "${env.EDITOR_COMPS}/PropertyPanel.tsx"
      - "${env.EDITOR_COMPS}/toolbar/TextControls.tsx"
      - "${env.EDITOR_COMPS}/toolbar/ShapeToolbar.tsx"
    ai_chat:
      - "${env.AI_CHAT_COMPS}/AIChatBox.tsx"
      - "${env.AI_CHAT_COMPS}/AIChatInputField.tsx"
      - "${env.AI_CHAT_COMPS}/GenerationProgressBar.tsx"
      - "${env.AI_CHAT_COMPS}/GenerationProgress.tsx"
    theme:
      - "${env.CLIENT_LIB}/theme-provider.tsx"
      - "${env.DESIGN_TOKENS}"
      - "${env.CLIENT_SRC}/components/UserProfileDropdown.tsx"

  # Files that are explicitly OFF-LIMITS in this epic
  NEVER_TOUCH_IN_THIS_EPIC:
    - "${env.EDITOR_COMPS}/CenterCanvas.tsx   # art board — intentionally neutral"
    - "*/BrandPalette*                         # content data, not UI"
    - "${env.PAYMENTS_SERVICE}                 # unrelated domain"

  # Key design token reference
  TOKEN_GUIDE: "${env.DOCS}/design/DESIGN_GUIDELINES.md"

  # Test commands for this epic
  TEST_E2E_DESIGN:  "npm run test:e2e -- --grep design-consistency"
  TEST_E2E_CONTRAST: "npm run test:e2e -- --grep design-contrast"
