# Environment variables required by EPIC-LAUNCH-01
# Update this file as you discover required env vars during implementation.
# Production values set in Railway dashboard.

epic: EPIC-LAUNCH-01

required:
  - name: RESEND_API_KEY
    description: "Resend API key for transactional email (US-LAUNCH-002). Absent locally → EmailService logs to console instead of sending."
    example: "re_xxxxxxxxxxxx"
    set_in: "Railway env vars (production); optional in local .env"
  - name: EMAIL_FROM
    description: "From address for all transactional email (verified domain in Resend)"
    example: "InfographicAI <no-reply@infographicai.example>"
    set_in: ".env (local) | Railway env vars (production)"
  - name: BETA_MODE
    description: "true → paid checkout disabled server-side (403 on subscription create) — US-LAUNCH-004"
    example: "true"
    set_in: "Railway env vars (production)"
  - name: VITE_BETA_MODE
    description: "true → pricing page shows beta messaging, checkout buttons replaced — US-LAUNCH-004"
    example: "true"
    set_in: "Railway env vars (production, build-time)"
  - name: RAZORPAY_KEY_ID
    description: "LIVE mode key (rzp_live_*) in production — US-LAUNCH-005. Startup assert fails prod boot on rzp_test_*."
    example: "rzp_live_xxxxxxxx"
    set_in: "Railway env vars (production) — keep rzp_test_* in local .env"
  - name: RAZORPAY_KEY_SECRET
    description: "LIVE mode secret in production — US-LAUNCH-005"
    set_in: "Railway env vars (production)"
  - name: RAZORPAY_WEBHOOK_SECRET
    description: "Secret of the LIVE webhook created for https://{prod-domain}/api/v1/webhooks/razorpay — US-LAUNCH-005"
    set_in: "Railway env vars (production)"
  - name: VITE_RAZORPAY_KEY_ID
    description: "LIVE public key exposed to browser checkout — US-LAUNCH-005"
    example: "rzp_live_xxxxxxxx"
    set_in: "Railway env vars (production, build-time)"
  - name: RAZORPAY_PLAN_SOLO_MONTHLY
    description: "LIVE plan ID (plans do NOT carry over from test mode — recreate in live dashboard) — US-LAUNCH-005"
    example: "plan_live_xxxxxxxx"
    set_in: "Railway env vars (production)"
  - name: RAZORPAY_PLAN_SOLO_ANNUAL
    description: "LIVE plan ID — US-LAUNCH-005"
    set_in: "Railway env vars (production)"
  - name: RAZORPAY_PLAN_TEAM_MONTHLY
    description: "LIVE plan ID (₹6,999 / 699900 paise — PT-05 verified in test mode; re-verify in live) — US-LAUNCH-005"
    set_in: "Railway env vars (production)"
  - name: RAZORPAY_PLAN_TEAM_ANNUAL
    description: "LIVE plan ID — US-LAUNCH-005"
    set_in: "Railway env vars (production)"
