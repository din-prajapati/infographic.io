git:
  default_branch: "main"
  # Default branching unit: one branch per milestone (3-7 stories share a branch).
  branch_format: "feat/{domain-lower}/{milestone-slug}"
  # Escape hatches (XL stories, parallel agents, hotfixes, spikes):
  branch_format_story: "feat/{domain-lower}/{story-id-lower}-{slug}"
  branch_format_hotfix: "hotfix/{domain-lower}/{slug}"
  branch_format_spike:  "spike/{slug}"
  # Per-task commits inside the milestone branch:
  commit_format: "{type}({scope}): T{n} {summary} — {US-ID}"
  pr_labels:
    - "epic:{domain-lower}"
    - "milestone:{milestone-id-lower}"
    - "type:{type}"
    - "priority:{P}"
  merge_strategy:
    milestone: "rebase"
    story:     "squash"
    hotfix:    "squash"

paths:
  agile_root: "docs/agile"
  epics: "docs/agile/epics"
  templates: "docs/agile/templates"
  decisions: "docs/agile/decisions"
  history: "docs/agile/history"
  roadmap: "docs/agile/ROADMAP.md"
  agile_index: "docs/agile/AGILE_INDEX.md"
  phase_tracker: "docs/agile/PHASE_TRACKER.md"
  team_status: "docs/agile/TEAM_STATUS.md"
  prd_inbox: "docs/agile/PRD"
  north_star: "docs/NORTH_STAR.md"
  rules: ".orion/rules"
  scaffold: ".orion/scaffold.json"

agent_flags:
  code_agent:
    respect_out_of_scope: true
    call_back_on_uncertainty: true
    run_gates_after_implementation: true
  test_agents:
    contract_first: true
    require_negative_tests: true
  reviewer:
    block_on_scope_creep: true
    require_test_evidence: true

sensitive_paths:
  - ".env"
  - ".env.local"
  - ".env.production"
  - "**/secrets/**"

# ─── AC Coverage Requirements (v0.4.0+) ──────────────────────────────────────
# Defines which Acceptance Criteria types are required per domain before a story
# can be locked for implementation. `orion run harden` reads this section.
#
# Built-in types: happy-path, error-path, security, session-expiry,
#   idempotency, currency-edge, rate-limit, null-input, concurrent,
#   rollback, offline, edge-case
#
# Rule: default types apply to every story. per_domain entries are additive.
# ─────────────────────────────────────────────────────────────────────────────
ac_coverage:
  # Required for every story regardless of domain:
  default: [happy-path, error-path]

  # Per-domain additions — uncomment and extend for your project:
  per_domain: {}
